<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />

    <!-- PWA / App meta -->
    <meta name="application-name" content="RallyPoint" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RallyPoint" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0B132B" />
    <meta name="description" content="RallyPoint — Sales event calendar. One Team. Every Event." />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />

    <title>RallyPoint</title>

    <!-- Splash screen styles -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #0B132B;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash .wordmark {
        font-family: Inter, system-ui, sans-serif;
        font-weight: 700;
        font-size: 32px;
        letter-spacing: -0.5px;
        color: white;
        margin-top: 20px;
      }
      #splash .wordmark span { color: #00D4FF; }
      #splash .tagline {
        font-family: Inter, system-ui, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 4px;
        color: rgba(255,255,255,0.3);
        margin-top: 8px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <svg width="80" height="80" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#0B132B" stroke="#2563FF" stroke-width="0.5" stroke-opacity="0.4"/>
        <circle cx="16" cy="16" r="2.5" fill="#2563FF"/>
        <circle cx="16" cy="7" r="2" fill="#00D4FF"/>
        <line x1="16" y1="9" x2="16" y2="13.5" stroke="#2563FF" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="23.5" cy="10.5" r="2" fill="#FF9F1C"/>
        <line x1="21.9" y1="11.9" x2="18" y2="14.8" stroke="#FF9F1C" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="23.5" cy="21.5" r="2" fill="#FF5C7A"/>
        <line x1="21.9" y1="20.1" x2="18" y2="17.2" stroke="#FF5C7A" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="16" cy="25" r="2" fill="#8B5CF6"/>
        <line x1="16" y1="23" x2="16" y2="18.5" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="8.5" cy="21.5" r="2" fill="#FFD60A"/>
        <line x1="10.1" y1="20.1" x2="14" y2="17.2" stroke="#FFD60A" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="8.5" cy="10.5" r="2" fill="#00D4FF"/>
        <line x1="10.1" y1="11.9" x2="14" y2="14.8" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="wordmark">Rally<span>Point</span></div>
      <div class="tagline">One Team. Every Event.</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/pwa-init.js"></script>
  </body>
</html>
