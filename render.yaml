services:
  - type: web
    name: trinity-sales-mission
    runtime: node
    buildCommand: npm install && npm rebuild better-sqlite3 && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    plan: free
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: /data/data.db
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: APP_URL
        sync: false
